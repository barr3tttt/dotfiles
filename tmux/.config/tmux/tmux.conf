# tmux configuration - agentic workflow ("The Ship")
# Multiplexer inside WezTerm: parallel panes/windows, detach/reattach server,
# muscle-memory navigation, and a minimalist rose-pine-moon status bar.

# ---------------------------------------------------------------- core
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB,wezterm:RGB"
set -g mouse on
set -sg escape-time 0          # no delay for ESC (vim-friendly)
set -g history-limit 50000
set -g focus-events on
set -g base-index 1            # windows start at 1
setw -g pane-base-index 1
set -g renumber-windows on     # keep window numbers gapless
set -g set-clipboard on
setw -g mode-keys vi

# ---------------------------------------------------------------- prefix
# Use C-a (screen-style) - easier reach than C-b.
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# ---------------------------------------------------------------- reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# ---------------------------------------------------------------- splits
# Intuitive split keys; new panes/windows open in the current path.
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"
unbind '"'
unbind %

# ---------------------------------------------------------------- navigation
# vim-style pane movement (prefix h/j/k/l) and resize (prefix H/J/K/L).
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
# quick window switching
bind -r n next-window
bind -r p previous-window

# vi copy-mode: v to select, y to yank
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# ---------------------------------------------------------------- rose-pine moon theme
# Palette: base #232136 surface #2a273f overlay #393552 muted #6e6a86
#          subtle #908caa text #e0def4 iris #c4a7e7 foam #9ccfd8 gold #f6c177
set -g status on
set -g status-position top
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=#232136,fg=#908caa"
set -g status-left-length 40
set -g status-right-length 80
set -g status-left "#[fg=#232136,bg=#c4a7e7,bold] #S #[fg=#c4a7e7,bg=#232136] "
set -g status-right "#[fg=#6e6a86]#H #[fg=#393552]|#[fg=#9ccfd8] %H:%M "
setw -g window-status-format "#[fg=#6e6a86] #I:#W "
setw -g window-status-current-format "#[fg=#232136,bg=#9ccfd8,bold] #I:#W #[fg=#9ccfd8,bg=#232136]"
setw -g window-status-separator ""
set -g pane-border-style "fg=#393552"
set -g pane-active-border-style "fg=#c4a7e7"
set -g message-style "bg=#2a273f,fg=#e0def4"
set -g mode-style "bg=#393552,fg=#e0def4"
