# ~/.tmux.conf - starter config (created by Claude; tweak freely)

# --- general ---
set -g mouse on                       # mouse: select panes, resize, scroll
set -g history-limit 50000            # bigger scrollback
set -g base-index 1                   # windows start at 1
setw -g pane-base-index 1             # panes start at 1
set -g renumber-windows on            # keep window numbers gap-free
set -sg escape-time 50                # low for snappy ESC in nvim, but high enough that
                                      # tmux assembles split DA/XTVERSION probe responses
                                      # instead of leaking them onto the prompt (tmux#3683)
set -g focus-events on                # let nvim know about focus
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"   # truecolor passthrough

# --- vi-style copy mode ---
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel

# --- splits: open in current path; intuitive keys ---
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# --- pane navigation (prefix + h/j/k/l) ---
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# --- reload config (prefix + r) ---
bind r source-file ~/.tmux.conf \; display-message "tmux.conf reloaded"

# --- status bar (Dracula, minimal) ---
set -g status on
set -g status-interval 15
set -g status-justify left
set -g status-position bottom
set -g status-left-length 40
set -g status-right-length 90

# overall bar
set -g status-style "bg=#282a36,fg=#f8f8f2"

# left: session name in a purple block
set -g status-left "#[fg=#282a36,bg=#bd93f9,bold] #S #[fg=#bd93f9,bg=#282a36] "

# right: battery (yellow) · date (cyan) · time (cyan, bold), comment-grey separators
set -g status-right "#[fg=#f1fa8c]󰁹 #(pmset -g batt | grep -Eo '[0-9]+%' | head -1) #[fg=#6272a4]│ #[fg=#8be9fd]%a %d %b #[fg=#6272a4]│ #[fg=#8be9fd,bold]%H:%M "

# windows: inactive = comment grey, active = pink, zoomed shows a magnifier
setw -g window-status-separator ""
setw -g window-status-format "#[fg=#6272a4] #I #W "
setw -g window-status-current-format "#[fg=#ff79c6,bold] #I #W#{?window_zoomed_flag, ,} "
setw -g window-status-activity-style "fg=#f1fa8c"

# pane borders: dim grey, active = purple
set -g pane-border-style "fg=#44475a"
set -g pane-active-border-style "fg=#bd93f9"

# command/message line + copy-mode selection
set -g message-style "bg=#44475a,fg=#f8f8f2"
set -g message-command-style "bg=#44475a,fg=#f8f8f2"
setw -g mode-style "bg=#bd93f9,fg=#282a36"
setw -g clock-mode-colour "#bd93f9"

# --- plugins (TPM): survive reboot via resurrect + continuum ---
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @resurrect-capture-pane-contents 'on'   # restore pane scrollback
set -g @continuum-restore 'on'                  # auto-restore last session on server start
set -g @continuum-save-interval '15'            # autosave every 15 min

# Keep this line last: initialize TPM
run '~/.tmux/plugins/tpm/tpm'
