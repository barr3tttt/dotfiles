# tmux config - malenia@pi
# Tracked here for backup/reference; it lives on the Pi at ~/.tmux.conf and is
# NOT auto-deployed by the laptop bootstrap (different machine). Deploy with:
#   cat pi/.tmux.conf | ssh pi 'cat > ~/.tmux.conf && tmux source-file ~/.tmux.conf'
#
# Same Ctrl-a prefix as the laptop, so when you ssh in from inside the laptop's
# tmux you get nested tmux - use the laptop's F12 toggle to pass keys through to
# this (inner) session. The status bar here is Tokyo Night blue and labeled PI:
# so the inner/outer layers are easy to tell apart.

# -- General -------------------------------------------------
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",*256col*:Tc"
set -g mouse on
set -g history-limit 50000
set -g base-index 1
setw -g pane-base-index 1
setw -g mode-keys vi
set -g renumber-windows on
set -g escape-time 0
set -g focus-events on
set -g status-interval 5

# -- Prefix --------------------------------------------------
# Ctrl-a (matches the laptop; easier to reach than Ctrl-b)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# -- Splits --------------------------------------------------
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind %
unbind \"
bind c new-window -c "#{pane_current_path}"

# -- Navigation ----------------------------------------------
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind r source-file ~/.tmux.conf \; display "Config reloaded"

# -- Theme (Tokyo Night) -------------------------------------
# Status bar - a solid PI: block makes the inner (Pi) session unmistakable.
set -g status-position top
set -g status-style "bg=#1a1b26,fg=#a9b1d6"
set -g status-left-length 30
set -g status-right-length 60
set -g status-left "#[fg=#1a1b26,bg=#7aa2f7,bold] PI:#S #[fg=#7aa2f7,bg=#1a1b26] "
set -g status-right "#[fg=#565f89]│ #[fg=#9ece6a]#H #[fg=#565f89]│ #[fg=#bb9af7]%H:%M "

# Window tabs
setw -g window-status-format "#[fg=#565f89] #I:#W "
setw -g window-status-current-format "#[fg=#7aa2f7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"

# Message style
set -g message-style "bg=#1a1b26,fg=#7aa2f7"
